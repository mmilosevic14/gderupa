name: Cloudflare Pages CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Next.js for Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build for Cloudflare
        run: npm run build:cf

  # Deployment is handled by Cloudflare Pages' native GitHub integration
  # Connect your repo in Cloudflare Pages dashboard: https://dash.cloudflare.com/pages
  # Build settings: Framework=Next.js, Build command=npm run build:cf, Output=.vercel/output/static
